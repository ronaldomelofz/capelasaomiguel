<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Lançamento — Livro Razão</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>

<div class="topbar">
  <span class="topbar-title">➕ Novo Lançamento</span>
</div>

<div class="page-body">
  <div style="max-width:640px;margin:0 auto;">
    <div id="form-alert" class="alert hidden"></div>
    <div class="card">
      <div class="form-section-title">Tipo de Lançamento</div>
      <div class="tipo-selector">
        <button class="tipo-btn receita selected" id="btn-receita" onclick="setTipo('receita')">📈 Receita</button>
        <button class="tipo-btn despesa" id="btn-despesa" onclick="setTipo('despesa')">📉 Despesa</button>
      </div>
      <input type="hidden" id="tipo" value="receita" />
      <div class="form-section-title mt-2">Dados do Lançamento</div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label for="data">Data *</label>
          <input type="date" id="data" />
        </div>
        <div class="form-group">
          <label for="valor">Valor (R$) *</label>
          <input type="text" id="valor" placeholder="0,00" inputmode="decimal" />
        </div>
      </div>
      <div class="form-group">
        <label for="categoria">Categoria *</label>
        <select id="categoria"></select>
      </div>
      <div class="form-group">
        <label for="descricao">Descrição *</label>
        <input type="text" id="descricao" placeholder="Descreva o lançamento" maxlength="200" />
      </div>
      <div class="form-group">
        <label for="responsavel">Responsável</label>
        <input type="text" id="responsavel" placeholder="Nome do responsável (opcional)" />
      </div>
      <div class="form-section-title mt-2">Observações e Comprovante</div>
      <div class="form-group">
        <label for="observacoes">Observações</label>
        <textarea id="observacoes" placeholder="Informações adicionais..." rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="numero-doc">Nº do Documento / Recibo</label>
        <input type="text" id="numero-doc" placeholder="Ex: NF 0001, Recibo 123..." />
      </div>
      <div class="form-group">
        <label for="forma-pagto">Forma de Pagamento</label>
        <select id="forma-pagto"></select>
      </div>
      <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem;">
        <a href="lancamentos.html" class="btn btn-outline">Cancelar</a>
        <button class="btn btn-primary" onclick="salvarLancamento()" id="btn-salvar">💾 Salvar Lançamento</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, isAdmin } from "../js/auth.js";
  import { renderLayout } from "../js/layout.js";
  import { CATEGORIAS_RECEITA, CATEGORIAS_DESPESA, FORMAS_PAGAMENTO_PADRAO } from "../js/config.js";
  import { addLancamento, getCategoriasCustom, getFormasPagamentoCustom } from "../js/api.js";

  renderLayout("novo");
  const { user, profile } = await requireAuth();

  if (!isAdmin(profile)) {
    document.querySelector(".page-body").innerHTML = `<div class="alert alert-error">⛔ Acesso negado. Apenas administradores podem criar lançamentos.</div>`;
    throw new Error("Acesso negado");
  }

  document.getElementById("data").value = new Date().toISOString().split("T")[0];

  async function populateFormasPagamento() {
    const sel = document.getElementById("forma-pagto");
    if (!sel) return;
    sel.innerHTML = '<option value="">— Selecione —</option>';
    try {
      const custom = (await getFormasPagamentoCustom()).map(f => f.nome);
      const formas = [...FORMAS_PAGAMENTO_PADRAO, ...custom];
      formas.forEach(f => { const o = document.createElement("option"); o.value = f; o.textContent = f; sel.appendChild(o); });
    } catch (e) {
      FORMAS_PAGAMENTO_PADRAO.forEach(f => { const o = document.createElement("option"); o.value = f; o.textContent = f; sel.appendChild(o); });
    }
  }

  async function populateCategories(tipo) {
    const sel = document.getElementById("categoria");
    if (!sel) return;
    sel.innerHTML = '<option value="">— Selecione a categoria —</option>';
    const defaults = tipo === "receita" ? CATEGORIAS_RECEITA : CATEGORIAS_DESPESA;
    try {
      const custom = (await getCategoriasCustom()).filter(c => c.tipo === tipo).map(c => c.nome);
      [...defaults, ...custom].forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; sel.appendChild(o); });
    } catch (e) {
      defaults.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; sel.appendChild(o); });
    }
  }
  populateCategories("receita");
  populateFormasPagamento();

  const valorEl = document.getElementById("valor");
  valorEl.addEventListener("input", () => {
    let v = valorEl.value.replace(/\D/g, "");
    if (!v) { valorEl.value = ""; return; }
    v = (parseInt(v, 10) / 100).toFixed(2);
    valorEl.value = parseFloat(v).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  });

  window.setTipo = function(tipo) {
    document.getElementById("tipo").value = tipo;
    document.getElementById("btn-receita").className = "tipo-btn receita " + (tipo === "receita" ? "selected" : "");
    document.getElementById("btn-despesa").className = "tipo-btn despesa " + (tipo === "despesa" ? "selected" : "");
    populateCategories(tipo);
  };

  window.salvarLancamento = async function() {
    const alertEl = document.getElementById("form-alert");
    alertEl.className = "alert hidden";

    const tipo = document.getElementById("tipo").value;
    const data = document.getElementById("data").value;
    const valorRaw = document.getElementById("valor").value.replace(/\./g,"").replace(",",".");
    const valor = parseFloat(valorRaw);
    const categoria = document.getElementById("categoria").value;
    const descricao = document.getElementById("descricao").value.trim();
    const responsavel = document.getElementById("responsavel").value.trim();
    const observacoes = document.getElementById("observacoes").value.trim();
    const numDoc = document.getElementById("numero-doc").value.trim();
    const formaPagto = document.getElementById("forma-pagto").value;

    if (!data || !valor || !categoria || !descricao) {
      alertEl.textContent = "Preencha todos os campos obrigatórios (*).";
      alertEl.className = "alert alert-error";
      return;
    }
    if (isNaN(valor) || valor <= 0) {
      alertEl.textContent = "Informe um valor válido e maior que zero.";
      alertEl.className = "alert alert-error";
      return;
    }

    const btn = document.getElementById("btn-salvar");
    btn.disabled = true; btn.textContent = "Salvando...";

    try {
      const [y, m] = data.split("-");
      await addLancamento({
        tipo, data, valor, categoria, descricao,
        responsavel: responsavel || null,
        observacoes: observacoes || null,
        numeroDocumento: numDoc || null,
        formaPagamento: formaPagto || null,
        criadoPor: user.uid,
        criadoPorEmail: user.email,
        mes: parseInt(m, 10),
        ano: parseInt(y, 10)
      });
      alertEl.textContent = "✅ Lançamento salvo com sucesso!";
    alertEl.className = "alert alert-success";
    document.getElementById("data").value = new Date().toISOString().split("T")[0];
    document.getElementById("valor").value = "";
    document.getElementById("categoria").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("responsavel").value = "";
    document.getElementById("observacoes").value = "";
    document.getElementById("numero-doc").value = "";
    document.getElementById("forma-pagto").value = "";
    setTimeout(() => { alertEl.className = "alert hidden"; }, 4000);
    } catch (e) {
      alertEl.textContent = "Erro ao salvar: " + (e.message || "tente novamente");
      alertEl.className = "alert alert-error";
    }
    btn.disabled = false; btn.textContent = "💾 Salvar Lançamento";
  };
</script>
</body>
</html>
