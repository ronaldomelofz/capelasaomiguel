<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lançamentos — Capela São Miguel Arcanjo</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>

<div class="topbar">
  <span class="topbar-title">📒 Lançamentos</span>
  <div class="topbar-actions">
    <a href="novo.html" class="btn btn-success admin-only">+ Novo</a>
  </div>
</div>

<div class="page-body">

  <!-- Filters -->
  <div class="filters-bar">
    <div class="filter-group">
      <label>Tipo</label>
      <select id="f-tipo">
        <option value="">Todos</option>
        <option value="receita">Receita</option>
        <option value="despesa">Despesa</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Mês</label>
      <select id="f-mes">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Ano</label>
      <select id="f-ano"></select>
    </div>
    <div class="filter-group">
      <label>Categoria</label>
      <select id="f-cat"><option value="">Todas</option></select>
    </div>
    <div class="filter-group">
      <label>Buscar</label>
      <input type="text" id="f-busca" placeholder="Descrição..." style="min-width:160px;" />
    </div>
    <button class="btn btn-primary" onclick="applyFilters()">🔍 Filtrar</button>
    <button class="btn btn-outline" onclick="resetFilters()">↺ Limpar</button>
  </div>

  <!-- Summary -->
  <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1rem;">
    <div class="kpi-tile receita"><div class="kpi-label">Receitas filtradas</div><div class="kpi-value" id="sum-receita" style="font-size:1.3rem">R$ 0,00</div></div>
    <div class="kpi-tile despesa"><div class="kpi-label">Despesas filtradas</div><div class="kpi-value" id="sum-despesa" style="font-size:1.3rem">R$ 0,00</div></div>
    <div class="kpi-tile saldo"><div class="kpi-label">Saldo filtrado</div><div class="kpi-value" id="sum-saldo" style="font-size:1.3rem">R$ 0,00</div></div>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Data</th><th>Tipo</th><th>Categoria</th><th>Descrição</th>
            <th>Forma Pagto</th><th>Responsável</th><th class="text-right">Valor</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody id="tbody-lanc">
          <tr><td colspan="8" class="text-center text-muted" style="padding:2rem">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <div class="pagination-info" id="pag-info"></div>
      <div class="pagination-controls" id="pag-controls"></div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-detalhe">
  <div class="modal">
    <div class="modal-header">
      <h3>Detalhes do Lançamento</h3>
      <button class="modal-close" onclick="closeModal('modal-detalhe')">×</button>
    </div>
    <div class="modal-body" id="modal-detalhe-body"></div>
    <div class="modal-footer">
      <button class="btn btn-primary btn-sm admin-only" id="btn-editar" onclick="abrirEdicao()">✏️ Editar</button>
      <button class="btn btn-danger btn-sm admin-only" id="btn-excluir" onclick="excluirLancamento()">🗑 Excluir</button>
      <button class="btn btn-outline btn-sm" onclick="closeModal('modal-detalhe')">Fechar</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <h3>Editar Lançamento</h3>
      <button class="modal-close" onclick="closeModal('modal-editar')">×</button>
    </div>
    <div class="modal-body">
      <div id="edit-alert" class="alert hidden"></div>
      <div class="form-group">
        <label>Tipo *</label>
        <select id="edit-tipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label>Data *</label>
          <input type="date" id="edit-data" />
        </div>
        <div class="form-group">
          <label>Valor (R$) *</label>
          <input type="text" id="edit-valor" placeholder="0,00" inputmode="decimal" />
        </div>
      </div>
      <div class="form-group">
        <label>Categoria *</label>
        <select id="edit-categoria"></select>
      </div>
      <div class="form-group">
        <label>Descrição *</label>
        <input type="text" id="edit-descricao" maxlength="200" />
      </div>
      <div class="form-group">
        <label>Responsável</label>
        <input type="text" id="edit-responsavel" />
      </div>
      <div class="form-group">
        <label>Observações</label>
        <textarea id="edit-observacoes" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label>Nº Documento</label>
        <input type="text" id="edit-numero-doc" />
      </div>
      <div class="form-group">
        <label>Forma de Pagamento</label>
        <select id="edit-forma-pagto"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal('modal-editar')">Cancelar</button>
      <button class="btn btn-primary btn-sm" id="btn-salvar-edicao" onclick="salvarEdicao()">💾 Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, isAdmin, formatBRL, formatDate, formatDatetime } from "../js/auth.js";
  import { CATEGORIAS_RECEITA, CATEGORIAS_DESPESA } from "../js/config.js";
  import { renderLayout } from "../js/layout.js";
  import { getLancamentos, deleteLancamento, updateLancamento, getCategoriasCustom, getFormasPagamentoCustom } from "../js/api.js";
  import { CATEGORIAS_RECEITA, CATEGORIAS_DESPESA, FORMAS_PAGAMENTO_PADRAO } from "../js/config.js";

  renderLayout("lancamentos");
  const { user, profile } = await requireAuth();
  const admin = isAdmin(profile);

  let allDocs = [];
  let filtered = [];
  let currentPage = 1;
  const PAGE_SIZE = 20;
  let selectedId = null;

  // Fill selects
  const now = new Date();
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const mesEl = document.getElementById("f-mes");
  meses.forEach((m,i) => { const o = document.createElement("option"); o.value = i+1; o.textContent = m; mesEl.appendChild(o); });
  mesEl.value = now.getMonth() + 1;
  const anoEl = document.getElementById("f-ano");
  for (let y = now.getFullYear(); y >= now.getFullYear()-5; y--) {
    const o = document.createElement("option"); o.value = y; o.textContent = y; anoEl.appendChild(o);
  }

  let customCats = [];
  try { customCats = (await getCategoriasCustom()).map(c => c.nome); } catch (e) {}
  const cats = [...new Set([...CATEGORIAS_RECEITA, ...CATEGORIAS_DESPESA, ...customCats])].sort();
  const catEl = document.getElementById("f-cat");
  cats.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; catEl.appendChild(o); });

  async function loadAll() {
    try {
      allDocs = await getLancamentos();
    } catch (e) {
      allDocs = [];
      console.error("Erro ao carregar lançamentos:", e);
    }
    applyFilters();
  }

  function getMes(d) { return d.mes ?? (d.data ? parseInt(d.data.split("-")[1], 10) : 0); }
  function getAno(d) { return d.ano ?? (d.data ? parseInt(d.data.split("-")[0], 10) : 0); }

  window.applyFilters = function() {
    const tipo   = document.getElementById("f-tipo").value;
    const mes    = document.getElementById("f-mes").value;
    const ano    = document.getElementById("f-ano").value;
    const cat    = document.getElementById("f-cat").value;
    const busca  = document.getElementById("f-busca").value.toLowerCase();

    filtered = allDocs.filter(d => {
      if (tipo && d.tipo !== tipo) return false;
      if (mes && getMes(d) !== +mes) return false;
      if (ano && getAno(d) !== +ano) return false;
      if (cat && d.categoria !== cat) return false;
      if (busca && !d.descricao?.toLowerCase().includes(busca)) return false;
      return true;
    });

    // Summaries
    let r = 0, de = 0;
    filtered.forEach(d => { if (d.tipo === "receita") r += d.valor; else de += d.valor; });
    document.getElementById("sum-receita").textContent = formatBRL(r);
    document.getElementById("sum-despesa").textContent = formatBRL(de);
    const sl = r - de;
    const slEl = document.getElementById("sum-saldo");
    slEl.textContent = formatBRL(sl);
    slEl.className = "kpi-value " + (sl >= 0 ? "saldo-positivo" : "saldo-negativo");
    slEl.style.fontSize = "1.3rem";

    currentPage = 1;
    renderPage();
  };

  window.resetFilters = function() {
    document.getElementById("f-tipo").value = "";
    document.getElementById("f-mes").value = "";
    document.getElementById("f-ano").value = "";
    document.getElementById("f-cat").value = "";
    document.getElementById("f-busca").value = "";
    filtered = [...allDocs];
    currentPage = 1;
    renderPage();
  };

  function renderPage() {
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);
    const tbody = document.getElementById("tbody-lanc");

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">📭</div><h4>Nenhum lançamento encontrado</h4><p>Ajuste os filtros ou cadastre novos lançamentos.</p></div></td></tr>`;
      document.getElementById("pag-info").textContent = "";
      document.getElementById("pag-controls").innerHTML = "";
      return;
    }

    tbody.innerHTML = page.map(d => `
      <tr>
        <td>${formatDate(d.data)}</td>
        <td><span class="badge badge-${d.tipo}">${d.tipo === "receita" ? "Receita" : "Despesa"}</span></td>
        <td>${d.categoria || "—"}</td>
        <td>${d.descricao}</td>
        <td>${d.formaPagamento || "—"}</td>
        <td>${d.responsavel || "—"}</td>
        <td class="text-right val-${d.tipo}">${formatBRL(d.valor)}</td>
        <td class="text-center">
          <button class="btn btn-outline btn-sm" onclick="openDetalhe('${d.id}')">👁 Ver</button>
          ${admin ? `<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openEdicao('${d.id}')">✏️ Editar</button>` : ""}
        </td>
      </tr>`).join("");

    // Pagination
    const total = filtered.length;
    const pages = Math.ceil(total / PAGE_SIZE);
    document.getElementById("pag-info").textContent = `Exibindo ${start+1}–${Math.min(start+PAGE_SIZE, total)} de ${total} registros`;
    let pHTML = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?"disabled":""}>‹</button>`;
    for (let p = Math.max(1, currentPage-2); p <= Math.min(pages, currentPage+2); p++) {
      pHTML += `<button class="page-btn ${p===currentPage?"active":""}" onclick="goPage(${p})">${p}</button>`;
    }
    pHTML += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?"disabled":""}>›</button>`;
    document.getElementById("pag-controls").innerHTML = pHTML;
  }

  window.goPage = function(p) { currentPage = p; renderPage(); };

  window.openDetalhe = function(id) {
    const d = allDocs.find(x => x.id === id);
    if (!d) return;
    selectedId = id;

    const excluirBtn = document.getElementById("btn-excluir");
    const editarBtn = document.getElementById("btn-editar");
    if (excluirBtn) excluirBtn.style.display = admin ? "inline-flex" : "none";
    if (editarBtn) editarBtn.style.display = admin ? "inline-flex" : "none";

    document.getElementById("modal-detalhe-body").innerHTML = `
      <div style="display:grid;gap:.75rem;">
        <div style="display:flex;gap:1rem;flex-wrap:wrap;">
          <div><strong>Tipo:</strong> <span class="badge badge-${d.tipo}">${d.tipo === "receita" ? "Receita" : "Despesa"}</span></div>
          <div><strong>Data:</strong> ${formatDate(d.data)}</div>
          <div><strong>Valor:</strong> <span class="val-${d.tipo}">${formatBRL(d.valor)}</span></div>
        </div>
        <div><strong>Categoria:</strong> ${d.categoria || "—"}</div>
        <div><strong>Descrição:</strong> ${d.descricao}</div>
        <div><strong>Forma de Pagamento:</strong> ${d.formaPagamento || "—"}</div>
        <div><strong>Responsável:</strong> ${d.responsavel || "—"}</div>
        <div><strong>Nº Documento:</strong> ${d.numeroDocumento || "—"}</div>
        ${d.observacoes ? `<div><strong>Observações:</strong><br/><em style="color:var(--text-muted)">${d.observacoes}</em></div>` : ""}
        <hr style="border:none;border-top:1px solid var(--border)"/>
        <div style="font-size:.8rem;color:var(--text-muted)">
          <div>Cadastrado por: ${d.criadoPorEmail || "—"}</div>
          <div>Em: ${d.criadoEm ? formatDatetime(d.criadoEm) : "—"}</div>
        </div>
      </div>`;
    document.getElementById("modal-detalhe").classList.add("open");
  };

  async function populateEditFormas() {
    const sel = document.getElementById("edit-forma-pagto");
    if (!sel) return;
    try {
      const custom = (await getFormasPagamentoCustom()).map(f => f.nome);
      const formas = [...FORMAS_PAGAMENTO_PADRAO, ...custom];
      sel.innerHTML = '<option value="">— Selecione —</option>';
      formas.forEach(f => { const o = document.createElement("option"); o.value = f; o.textContent = f; sel.appendChild(o); });
    } catch (e) {
      FORMAS_PAGAMENTO_PADRAO.forEach(f => { const o = document.createElement("option"); o.value = f; o.textContent = f; sel.appendChild(o); });
    }
  }

  async function populateEditCategorias(tipo) {
    const sel = document.getElementById("edit-categoria");
    const defaults = tipo === "receita" ? CATEGORIAS_RECEITA : CATEGORIAS_DESPESA;
    try {
      const custom = (await getCategoriasCustom()).filter(c => c.tipo === tipo).map(c => c.nome);
      sel.innerHTML = '<option value="">— Selecione —</option>';
      [...defaults, ...custom].forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; sel.appendChild(o); });
    } catch (e) {
      sel.innerHTML = '<option value="">— Selecione —</option>';
      defaults.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; sel.appendChild(o); });
    }
  }

  window.openEdicao = window.abrirEdicao = async function(id) {
    if (!admin) return;
    const lid = id || selectedId;
    if (!lid) return;
    const d = allDocs.find(x => x.id === lid);
    if (!d) return;
    selectedId = lid;
    closeModal("modal-detalhe");

    await populateEditCategorias(d.tipo);
    await populateEditFormas();

    document.getElementById("edit-tipo").value = d.tipo;
    document.getElementById("edit-data").value = d.data || "";
    document.getElementById("edit-valor").value = d.valor ? Number(d.valor).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "";
    document.getElementById("edit-categoria").value = d.categoria || "";
    document.getElementById("edit-descricao").value = d.descricao || "";
    document.getElementById("edit-responsavel").value = d.responsavel || "";
    document.getElementById("edit-observacoes").value = d.observacoes || "";
    document.getElementById("edit-numero-doc").value = d.numeroDocumento || "";
    document.getElementById("edit-forma-pagto").value = d.formaPagamento || "";
    document.getElementById("edit-alert").className = "alert hidden";
    document.getElementById("modal-editar").classList.add("open");
  };

  document.getElementById("edit-tipo").addEventListener("change", function() {
    populateEditCategorias(this.value);
  });

  const editValorEl = document.getElementById("edit-valor");
  if (editValorEl) {
    editValorEl.addEventListener("input", function() {
      let v = this.value.replace(/\D/g, "");
      if (!v) { this.value = ""; return; }
      v = (parseInt(v, 10) / 100).toFixed(2);
      this.value = parseFloat(v).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    });
  }

  window.salvarEdicao = async function() {
    const alertEl = document.getElementById("edit-alert");
    alertEl.className = "alert hidden";

    const tipo = document.getElementById("edit-tipo").value;
    const data = document.getElementById("edit-data").value;
    const valorRaw = document.getElementById("edit-valor").value.replace(/\./g, "").replace(",", ".");
    const valor = parseFloat(valorRaw);
    const categoria = document.getElementById("edit-categoria").value;
    const descricao = document.getElementById("edit-descricao").value.trim();
    const responsavel = document.getElementById("edit-responsavel").value.trim();
    const observacoes = document.getElementById("edit-observacoes").value.trim();
    const numDoc = document.getElementById("edit-numero-doc").value.trim();
    const formaPagto = document.getElementById("edit-forma-pagto").value;

    if (!data || !valor || !categoria || !descricao) {
      alertEl.textContent = "Preencha todos os campos obrigatórios (*).";
      alertEl.className = "alert alert-error";
      return;
    }
    if (isNaN(valor) || valor <= 0) {
      alertEl.textContent = "Informe um valor válido e maior que zero.";
      alertEl.className = "alert alert-error";
      return;
    }

    const btn = document.getElementById("btn-salvar-edicao");
    btn.disabled = true;
    try {
      const [y, m] = data.split("-");
      await updateLancamento(selectedId, {
        tipo, data, valor, categoria, descricao,
        responsavel: responsavel || null,
        observacoes: observacoes || null,
        numeroDocumento: numDoc || null,
        formaPagamento: formaPagto || null,
        mes: parseInt(m, 10),
        ano: parseInt(y, 10)
      });
      const idx = allDocs.findIndex(x => x.id === selectedId);
      if (idx >= 0) allDocs[idx] = { ...allDocs[idx], tipo, data, valor, categoria, descricao, responsavel: responsavel || null, observacoes: observacoes || null, numeroDocumento: numDoc || null, formaPagamento: formaPagto || null, mes: parseInt(m, 10), ano: parseInt(y, 10) };
      closeModal("modal-editar");
      applyFilters();
      alertEl.textContent = "✅ Lançamento atualizado!";
      alertEl.className = "alert alert-success";
    } catch (e) {
      alertEl.textContent = "Erro ao salvar: " + (e.message || "tente novamente");
      alertEl.className = "alert alert-error";
    }
    btn.disabled = false;
  };

  window.excluirLancamento = async function() {
    if (!selectedId) return;
    if (!confirm("Tem certeza que deseja excluir este lançamento? Esta ação não pode ser desfeita.")) return;
    await deleteLancamento(selectedId);
    allDocs = allDocs.filter(d => d.id !== selectedId);
    closeModal("modal-detalhe");
    applyFilters();
    alert("Lançamento excluído com sucesso.");
  };

  window.closeModal = id => document.getElementById(id).classList.remove("open");

  // Enter to filter
  document.getElementById("f-busca").addEventListener("keydown", e => { if (e.key === "Enter") applyFilters(); });

  loadAll();
</script>
</body>
</html>
