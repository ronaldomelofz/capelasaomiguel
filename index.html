<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Livro Razão — Paróquia</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-brand">
      <div class="login-cross">✝</div>
      <h1>Livro Razão</h1>
      <p>Gestão Financeira da Paróquia</p>
    </div>

    <div class="login-card">
      <h2>Acesso ao Sistema</h2>

      <div id="login-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label for="email">E-mail ou usuário</label>
        <input type="text" id="email" placeholder="admin ou seu@email.com" autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="btn-toggle-password" id="btn-toggle-password" onclick="togglePassword()" title="Mostrar/ocultar senha" aria-label="Mostrar senha">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="btn-login" onclick="doLogin()">
        <span id="btn-login-text">Entrar</span>
        <span id="btn-login-loading" class="hidden">Aguarde...</span>
      </button>

      <div class="login-links">
        <a href="#" onclick="doPasswordReset()">Esqueceu a senha?</a>
      </div>
    </div>

    <div class="login-footer">
      <small>Sistema seguro com Firebase Authentication</small>
      <small style="display:block;margin-top:.5rem;opacity:.8">Admin padrão: <strong>admin</strong> / <strong>admin</strong></small>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { FIREBASE_CONFIG, ADMIN_DEFAULT } from "./js/config.js";

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);

    // Redirect if already logged in
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = "pages/dashboard.html";
    });

    function getLoginEmail(input) {
      const val = input.trim().toLowerCase();
      const aliases = ADMIN_DEFAULT.usernames || [ADMIN_DEFAULT.username];
      if (aliases.some(a => val === String(a).toLowerCase())) return ADMIN_DEFAULT.email;
      return input.trim();
    }

    window.doLogin = async function() {
      const loginInput = document.getElementById("email").value.trim();
      const email = getLoginEmail(loginInput);
      const password = document.getElementById("password").value;
      const err = document.getElementById("login-error");
      const btnText = document.getElementById("btn-login-text");
      const btnLoad = document.getElementById("btn-login-loading");

      err.classList.add("hidden");
      btnText.classList.add("hidden");
      btnLoad.classList.remove("hidden");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "pages/dashboard.html";
      } catch (e) {
        let msg = "Erro ao fazer login.";
        const code = e.code || "";
        if (code === "auth/user-not-found" || code === "auth/invalid-credential")
          msg = "Usuário não encontrado. Crie o admin no Firebase Console (Authentication > Add user) com e-mail " + (ADMIN_DEFAULT.email || "admin@capelasaomiguel.com") + " e senha admin.";
        else if (code === "auth/wrong-password")
          msg = "Senha incorreta. Use 'admin' para o usuário padrão.";
        else if (code === "auth/too-many-requests")
          msg = "Muitas tentativas. Aguarde um momento.";
        else if (code === "auth/invalid-api-key" || code === "auth/configuration-not-found" || code === "auth/project-not-found")
          msg = "Firebase não configurado. Configure as variáveis de ambiente no Netlify (FIREBASE_API_KEY, FIREBASE_PROJECT_ID, etc.).";
        else if (code === "auth/network-request-failed")
          msg = "Erro de rede. Verifique: 1) Firebase Console > Authentication > Settings > adicione 'capelasaomiguel.netlify.app' em Domínios autorizados. 2) Variáveis do Firebase no Netlify.";
        else if (code.startsWith("auth/"))
          msg = "Erro de autenticação: " + (e.message || code);
        err.textContent = msg;
        err.classList.remove("hidden");
      } finally {
        btnText.classList.remove("hidden");
        btnLoad.classList.add("hidden");
      }
    };

    window.doPasswordReset = async function() {
      const loginInput = document.getElementById("email").value.trim();
      const email = getLoginEmail(loginInput);
      if (!loginInput) { alert("Digite seu e-mail ou usuário primeiro."); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        alert("E-mail de recuperação enviado!");
      } catch (e) {
        alert("Erro: verifique o e-mail informado.");
      }
    };

    window.togglePassword = function() {
      const input = document.getElementById("password");
      const btn = document.getElementById("btn-toggle-password");
      const isPass = input.type === "password";
      input.type = isPass ? "text" : "password";
      btn.textContent = isPass ? "🙈" : "👁";
      btn.setAttribute("aria-label", isPass ? "Ocultar senha" : "Mostrar senha");
    };

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
