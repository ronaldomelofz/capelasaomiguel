<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Livro Razão — Paróquia</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-brand">
      <div class="login-cross">✝</div>
      <h1>Livro Razão</h1>
      <p>Gestão Financeira da Paróquia</p>
    </div>

    <div class="login-card">
      <h2>Acesso ao Sistema</h2>

      <div id="login-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label for="email">E-mail ou usuário</label>
        <input type="text" id="email" placeholder="admin ou seu@email.com" autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="btn-toggle-password" id="btn-toggle-password" onclick="togglePassword()" title="Mostrar/ocultar senha" aria-label="Mostrar senha">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="btn-login" onclick="doLogin()">
        <span id="btn-login-text">Entrar</span>
        <span id="btn-login-loading" class="hidden">Aguarde...</span>
      </button>
    </div>

    <div class="login-footer">
      <small>Sistema local — dados no navegador</small>
      <small style="display:block;margin-top:.5rem;opacity:.8">Admin padrão: <strong>admin</strong> / <strong>admin</strong></small>
      <button type="button" class="btn btn-outline btn-sm" style="margin-top:.75rem;font-size:.8rem" onclick="document.getElementById('modal-import').classList.add('open')">📥 Importar usuários (outro dispositivo)</button>
    </div>
  </div>

  <!-- Modal Importar Usuários -->
  <div class="modal-overlay" id="modal-import">
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <h3>Importar usuários</h3>
        <button class="modal-close" onclick="document.getElementById('modal-import').classList.remove('open')">×</button>
      </div>
      <div class="modal-body">
        <p class="text-muted" style="font-size:.9rem">Se você foi cadastrado em outro computador, peça ao administrador o arquivo de usuários e importe aqui.</p>
        <div id="import-alert" class="alert hidden"></div>
        <div class="form-group">
          <label>Arquivo JSON de usuários</label>
          <input type="file" id="import-file" accept=".json,application/json" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="document.getElementById('modal-import').classList.remove('open')">Fechar</button>
        <button class="btn btn-primary" onclick="doImportUsuarios()">Importar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { login } from "./js/auth.js";
    import { importUsuarios } from "./js/api.js";

    if (localStorage.getItem("livro_razao_session")) {
      try {
        const s = JSON.parse(localStorage.getItem("livro_razao_session"));
        if (s.expires > Date.now()) window.location.href = "pages/dashboard.html";
      } catch {}
    }

    window.togglePassword = function() {
      const input = document.getElementById("password");
      const btn = document.getElementById("btn-toggle-password");
      const isPass = input.type === "password";
      input.type = isPass ? "text" : "password";
      btn.textContent = isPass ? "🙈" : "👁";
      btn.setAttribute("aria-label", isPass ? "Ocultar senha" : "Mostrar senha");
    };

    window.doLogin = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const err = document.getElementById("login-error");
      const btnText = document.getElementById("btn-login-text");
      const btnLoad = document.getElementById("btn-login-loading");

      err.classList.add("hidden");
      btnText.classList.add("hidden");
      btnLoad.classList.remove("hidden");

      if (!email || !password) {
        err.textContent = "Preencha usuário e senha.";
        err.classList.remove("hidden");
        btnText.classList.remove("hidden");
        btnLoad.classList.add("hidden");
        return;
      }

      const ok = await login(email, password);
      if (ok) window.location.href = "pages/dashboard.html";
      else {
        err.textContent = "Usuário ou senha inválidos. Use admin/admin para o primeiro acesso. Se foi cadastrado em outro computador, use \"Importar usuários\" abaixo.";
        err.classList.remove("hidden");
      }
      btnText.classList.remove("hidden");
      btnLoad.classList.add("hidden");
    };

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    window.doImportUsuarios = async function() {
      const input = document.getElementById("import-file");
      const alertEl = document.getElementById("import-alert");
      if (!input.files.length) {
        alertEl.textContent = "Selecione um arquivo.";
        alertEl.className = "alert alert-error";
        return;
      }
      try {
        const text = await input.files[0].text();
        const data = JSON.parse(text);
        const arr = Array.isArray(data) ? data : (data.usuarios || []);
        const n = importUsuarios(arr);
        alertEl.textContent = n > 0 ? `✅ ${n} usuário(s) importado(s). Tente fazer login.` : "Nenhum usuário novo para importar.";
        alertEl.className = "alert " + (n > 0 ? "alert-success" : "alert-info");
        input.value = "";
        if (n > 0) document.getElementById("modal-import").classList.remove("open");
      } catch (e) {
        alertEl.textContent = "Arquivo inválido: " + (e.message || "erro");
        alertEl.className = "alert alert-error";
      }
    };
  </script>
</body>
</html>
