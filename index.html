<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Capela São Miguel Arcanjo</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-brand">
      <div class="login-brand-inner">
        <img src="capelasaomiguelarcanjo.png" alt="Capela São Miguel Arcanjo" class="login-logo" />
        <div class="login-brand-text">
          <h1>Capela São Miguel Arcanjo</h1>
          <p>Gestão Financeira da Capela São Miguel Arcanjo</p>
        </div>
      </div>
    </div>

    <div class="login-card">
      <h2>Acesso ao Sistema</h2>

      <div id="login-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label for="email">E-mail ou usuário</label>
        <input type="text" id="email" placeholder="" autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="btn-toggle-password" id="btn-toggle-password" title="Mostrar/ocultar senha" aria-label="Mostrar senha">👁</button>
        </div>
      </div>

      <button type="button" class="btn btn-primary btn-block" id="btn-login">
        <span id="btn-login-text">Entrar</span>
        <span id="btn-login-loading" class="hidden">Aguarde...</span>
      </button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var btnToggle = document.getElementById("btn-toggle-password");
      var inputPass = document.getElementById("password");
      if (btnToggle && inputPass) {
        btnToggle.addEventListener("click", function() {
          var isPass = inputPass.type === "password";
          inputPass.type = isPass ? "text" : "password";
          btnToggle.textContent = isPass ? "🙈" : "👁";
          btnToggle.setAttribute("aria-label", isPass ? "Ocultar senha" : "Mostrar senha");
        });
      }
    });
  </script>
  <script type="module">
    import { login } from "./js/auth.js";

    if (localStorage.getItem("livro_razao_session")) {
      try {
        const s = JSON.parse(localStorage.getItem("livro_razao_session"));
        if (s.expires > Date.now()) window.location.href = "pages/dashboard.html";
      } catch {}
    }

    var btnLogin = document.getElementById("btn-login");
    var inpPass = document.getElementById("password");
    if (btnLogin) btnLogin.addEventListener("click", doLogin);
    if (inpPass) inpPass.addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });

    async function doLogin() {
      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;
      var err = document.getElementById("login-error");
      var btnText = document.getElementById("btn-login-text");
      var btnLoad = document.getElementById("btn-login-loading");

      err.classList.add("hidden");
      if (btnText) btnText.classList.add("hidden");
      if (btnLoad) btnLoad.classList.remove("hidden");

      if (!email || !password) {
        err.textContent = "Preencha usuário e senha.";
        err.classList.remove("hidden");
        if (btnText) btnText.classList.remove("hidden");
        if (btnLoad) btnLoad.classList.add("hidden");
        return;
      }

      try {
        var ok = await login(email, password);
        if (ok) window.location.href = "pages/dashboard.html";
        else {
          err.textContent = "Usuário ou senha inválidos. Use admin/admin para o primeiro acesso.";
          err.classList.remove("hidden");
        }
      } catch (e) {
        err.textContent = (e && e.message) || "Erro ao conectar. Verifique a configuração do Supabase.";
        err.classList.remove("hidden");
      }
      if (btnText) btnText.classList.remove("hidden");
      if (btnLoad) btnLoad.classList.add("hidden");
    }
  </script>
</body>
</html>
